name: release
on:
  push:
    branches:
      - release/*
    tags:
      - v*
  workflow_dispatch:
jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: briansalehi/tauri:latest
    steps:
      - name: Checkout Repository for Android
        uses: actions/checkout@v6.0.2
      - name: Build Linux Desktop Application
        run: cargo tauri build
        timeout-minutes: 20
      - name: Store Artifacts
        run: |
          deb_path=$(find app/src-tauri/target/release/bundle/deb -type f -name "*.deb")
          rpm_path=$(find app/src-tauri/target/release/bundle/rpm -type f -name "*.rpm")
          mkdir packages
          mv $deb_path packages
          mv $rpm_path packages
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-linux
          path: packages/
          retention-days: 1
  build-android:
    runs-on: ubuntu-latest
    container:
      image: briansalehi/tauri:latest
    steps:
      - name: Checkout Repository for Android
        uses: actions/checkout@v6.0.2
      - name: Initialize Android Project
        run: cargo tauri android init
      - name: Configure Gradle
        run: |
          sed -i '/getByName("release")/a signingConfig = signingConfigs.getByName("release")' $(find app -type f -name build.gradle.kts)
          sed -i '/^android {/a signingConfigs { create("release") { storeFile = file("keystore.jks"); storePassword = file("keystore.txt").readText().trim(); keyAlias = "flashback"; keyPassword = file("keystore.txt").readText().trim(); } }' $(find app -type f -name build.gradle.kts)
      - name: Generate Icon
        run: cargo tauri icon app/src-tauri/icons/flashback-transparent.png
      - name: Store Credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          printf '%s' "${KEYSTORE_BASE64}" | base64 -d > app/src-tauri/gen/android/app/keystore.jks
          printf '%s' "${KEYSTORE_PASSWORD}" > app/src-tauri/gen/android/app/keystore.txt
          printf 'keyAlias=%s\nkeyPassword=%s\npassword=%s\nstoreFile=keystore.jks' "${KEYSTORE_ALIAS}" "${KEYSTORE_PASSWORD}" "${KEYSTORE_PASSWORD}" > app/src-tauri/gen/android/keystore.properties
      - name: Build Android Package
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: cargo tauri android build
        timeout-minutes: 20
      - name: Store Artifacts
        run: |
          apk_path=$(find app/src-tauri/gen/android/app/build/outputs/apk/universal/release -type f -name "*.apk")
          aab_path=$(find app/src-tauri/gen/android/app/build/outputs/bundle/universalRelease -type f -name "*.aab")
          mkdir packages
          mv $apk_path packages/flashback.apk
          mv $aab_path packages/flashback.aab
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-android
          path: packages/
          retention-days: 1
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Import Distribution Certificate
        env:
          P12_DATA: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_DATA" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      - name: Install Provisioning Profile
        env:
          PROFILE_DATA: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$PROFILE_DATA" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Setup App Store Connect API Key
        env:
          API_KEY_DATA: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_DATA" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
      - name: Generate app icons
        working-directory: app
        run: cargo tauri icon src-tauri/icons/flashback.png
      - name: Initialize iOS project
        working-directory: app
        run: cargo tauri ios init
      - name: Copy iOS config files
        run: cp app/src-tauri/apple/* app/src-tauri/gen/apple/
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Regenerate Xcode project
        working-directory: app/src-tauri/gen/apple
        run: xcodegen generate
      - name: Build iOS
        working-directory: app
        run: cargo tauri ios build
        timeout-minutes: 30
      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "app/src-tauri/gen/apple/build/arm64/Flashback.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  publish-artifacts:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-android
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-linux
          path: packages/
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-android
          path: packages/
      - id: package-files
        run: |
          deb_path=$(ls packages/*.deb)
          rpm_path=$(ls packages/*.rpm)
          apk_path=packages/flashback.apk
          aab_path=packages/flashback.aab
          echo "deb_path=$deb_path" >> $GITHUB_OUTPUT
          echo "rpm_path=$rpm_path" >> $GITHUB_OUTPUT
          echo "apk_path=$apk_path" >> $GITHUB_OUTPUT
          echo "aab_path=$aab_path" >> $GITHUB_OUTPUT
          version="$(echo $deb_path | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "deb_file=flashback-${version}-amd64.deb" >> $GITHUB_OUTPUT
          echo "rpm_file=flashback-${version}-amd64.rpm" >> $GITHUB_OUTPUT
          echo "apk_file=flashback-${version}.apk" >> $GITHUB_OUTPUT
          echo "aab_file=flashback-${version}.aab" >> $GITHUB_OUTPUT
      - id: create-release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          tag_name: "${{ github.ref_name }}"
          release_name: "Flashback ${{ github.ref_name }}"
          body: "Use one of the installation packages below to install Flashback on your system."
          draft: false
          prerelease: false
      - uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: ${{ steps.package-files.outputs.deb_path }}
          asset_name: ${{ steps.package-files.outputs.deb_file }}
          asset_content_type: "application/x-deb"
      - uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: ${{ steps.package-files.outputs.rpm_path }}
          asset_name: ${{ steps.package-files.outputs.rpm_file }}
          asset_content_type: "application/x-rpm"
      - uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: ${{ steps.package-files.outputs.apk_path }}
          asset_name: ${{ steps.package-files.outputs.apk_file }}
          asset_content_type: "application/vnd.android.package-archive"
