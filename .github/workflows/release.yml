name: release
on:
  push:
    branches:
      - release/*
    tags:
      - v*
  workflow_dispatch:
jobs:
  build-linux:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --locked --version "^2" tauri-cli
      - name: Generate Icon
        run: cargo tauri icon app/src-tauri/icons/flashback.png
      - name: Build Linux Desktop Application
        run: cargo tauri build
        timeout-minutes: 20
      - name: Store Artifacts
        run: |
          deb_path=$(find app/src-tauri/target/release/bundle/deb -type f -name "*.deb")
          rpm_path=$(find app/src-tauri/target/release/bundle/rpm -type f -name "*.rpm")
          mkdir packages
          mv $deb_path packages
          mv $rpm_path packages
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-linux
          path: packages/
          retention-days: 1
  build-android:
    if: false
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 29.0.13846066
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;29.0.13846066 platform-tools'
      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --locked --version "^2" tauri-cli
      - name: Initialize Android Project
        run: cargo tauri android init
      - name: Configure Gradle
        run: |
          sed -i '/getByName("release")/a signingConfig = signingConfigs.getByName("release")' $(find app -type f -name build.gradle.kts)
          sed -i '/^android {/a signingConfigs { create("release") { storeFile = file("keystore.jks"); storePassword = file("keystore.txt").readText().trim(); keyAlias = "flashback"; keyPassword = file("keystore.txt").readText().trim(); } }' $(find app -type f -name build.gradle.kts)
      - name: Generate Icon
        run: cargo tauri icon app/src-tauri/icons/flashback.png
      - name: Store Credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          printf '%s' "${KEYSTORE_BASE64}" | base64 -d > app/src-tauri/gen/android/app/keystore.jks
          printf '%s' "${KEYSTORE_PASSWORD}" > app/src-tauri/gen/android/app/keystore.txt
          printf 'keyAlias=%s\nkeyPassword=%s\npassword=%s\nstoreFile=keystore.jks' "${KEYSTORE_ALIAS}" "${KEYSTORE_PASSWORD}" "${KEYSTORE_PASSWORD}" > app/src-tauri/gen/android/keystore.properties
      - name: Build Android Package
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: cargo tauri android build
        timeout-minutes: 20
      - name: Store Artifacts
        run: |
          apk_path=$(find app/src-tauri/gen/android/app/build/outputs/apk/universal/release -type f -name "*.apk")
          aab_path=$(find app/src-tauri/gen/android/app/build/outputs/bundle/universalRelease -type f -name "*.aab")
          mkdir packages
          mv $apk_path packages/flashback.apk
          mv $aab_path packages/flashback.aab
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-android
          path: packages/
          retention-days: 1
  build-ios:
    if: false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --locked --version "^2" tauri-cli
      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
      - name: Import Distribution Certificate
        env:
          P12_DATA: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_DATA" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      - name: Install Provisioning Profile
        env:
          PROFILE_DATA: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$PROFILE_DATA" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Initialize iOS project
        working-directory: app
        run: cargo tauri ios init
      - name: Generate app icons
        working-directory: app
        run: cargo tauri icon src-tauri/icons/flashback.png
      - name: Copy iOS config files
        run: cp app/src-tauri/apple/* app/src-tauri/gen/apple/
      - name: Install xcodegen
        run: brew upgrade xcodegen || brew install xcodegen
      - name: Regenerate Xcode project
        working-directory: app/src-tauri/gen/apple
        run: xcodegen generate
      - name: Build iOS
        working-directory: app
        run: cargo tauri ios build
        timeout-minutes: 30
      - name: Store Artifacts
        run: |
          mkdir packages
          cp app/src-tauri/gen/apple/build/arm64/Flashback.ipa packages/flashback.ipa
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-ios
          path: packages/
          retention-days: 1
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository for Windows
        uses: actions/checkout@v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --locked --version "^2" tauri-cli
      - name: Generate Icon
        run: cargo tauri icon app/src-tauri/icons/flashback.png
      - name: Build
        run: cargo tauri build
        timeout-minutes: 20
      - name: Stage MSIX Files
        shell: bash
        run: |
          exe_path=$(find app/src-tauri/target/release -maxdepth 1 -type f -name "*.exe")
          exe_name=$(basename "$exe_path")
          version=$(find app/src-tauri/target/release/bundle/msi -name "*.msi" -printf "%f\n" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          mkdir -p msix-staging/Assets packages-msix
          cp "$exe_path" msix-staging/
          magick app/src-tauri/icons/flashback.png -resize 50x50 msix-staging/Assets/StoreLogo.png
          magick app/src-tauri/icons/flashback.png -resize 44x44 msix-staging/Assets/Square44x44Logo.png
          magick app/src-tauri/icons/flashback.png -resize 150x150 msix-staging/Assets/Square150x150Logo.png
          sed -e "s|__VERSION__|${version}.0|g" -e "s|__EXECUTABLE__|${exe_name}|g" \
            app/src-tauri/msix/AppxManifest.xml > msix-staging/AppxManifest.xml
      - name: Build MSIX
        shell: pwsh
        run: |
          $makeAppx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $makeAppx) { throw "MakeAppx.exe not found" }
          & $makeAppx pack /d msix-staging /p packages-msix/flashback.msix /nv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Store Artifacts
        shell: bash
        run: |
          exe_path=$(find app/src-tauri/target/release/bundle/nsis -type f -name "Flashback*.exe")
          msi_path=$(find app/src-tauri/target/release/bundle/msi -type f -name "Flashback*.msi")
          mkdir packages
          mv "$exe_path" packages/flashback.exe
          mv "$msi_path" packages/flashback.msi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-windows
          path: packages/
          retention-days: 1
      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-windows-store
          path: packages-msix/
          retention-days: 1
  publish-artifacts:
    runs-on: ubuntu-latest
    if: false
    needs:
      - build-linux
      - build-android
      - build-windows
      - build-ios
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-linux
          path: packages/
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-windows
          path: packages/
      - name: Rename packages
        run: |
          version="$(ls packages/*.deb | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          mv packages/*.deb packages/flashback-${version}-amd64.deb
          mv packages/*.rpm packages/flashback-${version}-amd64.rpm
          mv packages/flashback.exe packages/flashback-${version}.exe
          mv packages/flashback.msi packages/flashback-${version}.msi
      - uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          tag_name: "${{ github.ref_name }}"
          release_name: "Flashback ${{ github.ref_name }}"
          body: "Use one of the installation packages below to install Flashback on your system."
          draft: false
          prerelease: false
          files: |
            packages/*.deb
            packages/*.rpm
            packages/*.exe
            packages/*.msi
  publish-google-play:
    if: false
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-android
      - build-windows
      - build-ios
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-android
          path: packages/
      - uses: r0adkll/upload-google-play@v1.1.3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.us.flashback
          releaseFiles: packages/flashback.aab
          track: internal
          status: completed
  publish-app-store:
    if: false
    runs-on: macos-15
    needs:
      - build-linux
      - build-android
      - build-windows
      - build-ios
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-ios
          path: packages/
      - name: Setup App Store Connect API Key
        env:
          API_KEY_DATA: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_DATA" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "packages/flashback.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  publish-microsoft-store:
    runs-on: windows-latest
    needs:
      - build-windows
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages-windows-store
          path: packages/
      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1
      - name: Configure MSStore CLI
        shell: bash
        run: |
          msstore reconfigure \
            --tenantId "${{ secrets.MICROSOFT_STORE_TENANT_ID }}" \
            --sellerId "${{ secrets.MICROSOFT_STORE_SELLER_ID }}" \
            --clientId "${{ secrets.MICROSOFT_STORE_CLIENT_ID }}" \
            --clientSecret "${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}"
      - name: Publish to Microsoft Store
        run: msstore publish "${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}"
