name: release
on:
  push:
    branches:
      - release/*
    tags:
      - v*
  workflow_dispatch:
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install --yes --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-1 libgtk-3-dev openjdk-21-jdk openjdk-21-jdk-headless
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri
        run: cargo install tauri-cli --version '^2.10.1' --locked
      - name: Build
        run: cargo tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm
  release:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - id: download-artifacts
        name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - run: cargo tauri build
      - run: cargo tauri publish
      - id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          tag_name: "${{ github.ref_name }}"
          release_name: "Release ${{ github.ref_name }}"
          body: "Installation packages"
          draft: false
          prerelease: false
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: "${{ steps.download-artifacts.outputs.artifact_path }}/*.deb"
          asset_name: "deb-packages"
          asset_content_type: "application/x-deb"
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: "${{ steps.download_artifacts.outputs.artifact_path }}/*.rpm"
          asset_name: "rpm-packages"
          asset_content_type: "application/x-rpm"
