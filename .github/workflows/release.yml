name: release
on:
  push:
    branches:
      - release/*
    tags:
      - v*
  workflow_dispatch:
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        run: sudo apt update && sudo apt install --yes --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-1 libgtk-3-dev openjdk-21-jdk openjdk-21-jdk-headless
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri
        run: cargo install tauri-cli --version '^2.10.1' --locked
      - name: Build Linux Desktop Application
        run: cargo tauri build
      - id: artifacts
        name: Locating Artifacts
        run: |
          deb_path=$(find app/src-tauri/target/release/bundle/deb -type f -name "*.deb")
          rpm_path=$(find app/src-tauri/target/release/bundle/rpm -type f -name "*.rpm")
          mkdir artifacts
          mv $deb_path artifacts
          mv $rpm_path artifacts
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: packages
          path: artifacts/
          retention-days: 1
  publish-artifacts:
    runs-on: ubuntu-latest
    needs: [ build-linux ]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages
          path: artifacts/
      - id: create-release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          tag_name: "${{ github.ref_name }}"
          release_name: "Release ${{ github.ref_name }}"
          body: "Installation packages"
          draft: false
          prerelease: false
      - uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: artifacts/*.deb
          asset_name: "deb-packages"
          asset_content_type: "application/x-deb"
      - uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: "${{ secrets.github_token }}"
        with:
          upload_url: "${{ steps.create-release.outputs.upload_url }}"
          asset_path: artifacts/*.rpm
          asset_name: "rpm-packages"
          asset_content_type: "application/x-rpm"
